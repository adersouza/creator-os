name: Security

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

permissions:
  contents: read
  security-events: write

jobs:
  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: actions/dependency-review-action@v5
        continue-on-error: true
        with:
          fail-on-severity: high
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-1.0, AGPL-3.0

  codeql:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
          - language: python
    steps:
      - uses: actions/checkout@v6
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - name: Current tree secret hygiene
        run: bash scripts/security/secret-scan.sh
      - name: TruffleHog full-history secret scan
        continue-on-error: true
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --fail

  trivy:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - name: Trivy scan
        uses: docker://aquasec/trivy:0.65.0
        with:
          args: >-
            fs .
            --scanners vuln,secret,misconfig,license
            --format sarif
            --output trivy-results.sarif
            --severity CRITICAL,HIGH
            --ignore-unfixed
            --exit-code 0
            --skip-dirs node_modules
            --skip-dirs apps/dashboard/storybook-static
            --skip-dirs graphify-out
      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
