name: Security

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

permissions:
  contents: read
  security-events: write

jobs:
  codeql:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
          - language: python
    steps:
      - uses: actions/checkout@v6
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - name: Current tree secret hygiene
        run: bash scripts/security/secret-scan.sh
      - name: TruffleHog full-history secret scan
        uses: trufflesecurity/trufflehog@main
        with:
          # The action injects --fail itself; keep extra args to policy filters only.
          extra_args: --only-verified

  trivy:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - name: Trivy scan
        id: trivy-sarif
        continue-on-error: true
        uses: docker://aquasec/trivy:0.65.0
        with:
          args: >-
            fs .
            --scanners vuln,secret,misconfig,license
            --format sarif
            --output trivy-results.sarif
            --severity CRITICAL,HIGH
            --ignore-unfixed
            --exit-code 1
            --skip-dirs node_modules
            --skip-dirs graphify-out
      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
      - name: Gate Trivy HIGH/CRITICAL findings
        if: steps.trivy-sarif.outcome == 'failure'
        run: |
          echo "Trivy found HIGH/CRITICAL findings. Review trivy-results.sarif and add explicit ignores only for accepted false positives."
          exit 1
