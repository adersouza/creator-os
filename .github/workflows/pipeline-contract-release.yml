name: Release pipeline contracts

on:
  push:
    tags:
      - "pipeline-contracts-v*"

permissions: {}

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 11.6.0
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Verify tag matches package version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          package_version=$(node -p "require('./packages/pipeline_contracts/package.json').version")
          test "$RELEASE_TAG" = "pipeline-contracts-v$package_version"
      - run: pnpm check:contracts
      - run: pnpm --filter @creator-os/pipeline-contracts build
      - run: pnpm --filter @creator-os/pipeline-contracts test
      - run: pnpm pack:contracts
      - name: Create immutable release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          artifact=$(find artifacts/pipeline-contracts -name '*.tgz' -type f -print -quit)
          test -n "$artifact"
          sha256sum "$artifact" > "$artifact.sha256"
          gh release create "$GITHUB_REF_NAME" "$artifact" "$artifact.sha256" --verify-tag --generate-notes
