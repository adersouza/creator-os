name: ThreadsDashboard performance sync

on:
  schedule:
    - cron: "37 * * * *"
  workflow_dispatch:

jobs:
  sync-performance:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CAMPAIGN_FACTORY_SYNC_CAMPAIGN: ${{ vars.CAMPAIGN_FACTORY_SYNC_CAMPAIGN }}
      THREADSDASH_USER_ID: ${{ vars.THREADSDASH_USER_ID }}
      CAMPAIGN_FACTORY_SYNC_LIMIT: ${{ vars.CAMPAIGN_FACTORY_SYNC_LIMIT || '1000' }}
      SUPABASE_URL: ${{ secrets.THREADSDASH_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.THREADSDASH_SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - name: Sync ThreadsDashboard post_metric_history into Campaign Factory
        run: python3 scripts/sync_threadsdash_performance.py
