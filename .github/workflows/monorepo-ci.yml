name: Creator OS Monorepo CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 11.6.0
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check:contracts
      - name: Build versioned pipeline-contracts package
        run: pnpm pack:contracts
      - uses: actions/upload-artifact@v7
        with:
          name: pipeline-contracts-${{ github.sha }}
          path: artifacts/pipeline-contracts/*.tgz
          if-no-files-found: error
          retention-days: 30

  architecture:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: pnpm/action-setup@v6
        with:
          version: 11.6.0
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - uses: astral-sh/setup-uv@v7
      - run: pnpm install --frozen-lockfile
      - run: uv sync --dev
      - run: pnpm lint:py
      - run: pnpm typecheck:py
      - run: pnpm check:arch
      - run: pnpm check:arch:fixtures
      - name: Offline prompt regressions
        run: pnpm check:prompts

  javascript:
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 11.6.0
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - uses: astral-sh/setup-uv@v7
      - name: Install media tooling
        run: brew install ffmpeg tesseract
      - run: pnpm install --frozen-lockfile
      - name: Install ContentForge Python dependencies
        run: uv sync --all-extras --all-packages
      - run: pnpm --filter @creator-os/pipeline-contracts build
      - run: pnpm --filter @creator-os/pipeline-contracts test
      - run: pnpm --filter contentforge lint
      - run: pnpm --filter contentforge test
      - run: pnpm --filter contentforge build

  python:
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 11.6.0
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - uses: astral-sh/setup-uv@v7
      - name: Install media tooling
        run: brew install ffmpeg tesseract
      - run: pnpm install --frozen-lockfile
      - run: uv sync --all-extras --all-packages
      - run: uv run python -m pytest packages/pipeline_contracts/tests
      - run: uv run python -m pytest packages/creator_os_core/tests
      - run: uv run python -m pytest python_packages/campaign_factory/tests
      - run: uv run python -m pytest python_packages/reel_factory/tests
      - run: uv run python -m pytest python_packages/reference_factory/tests
      - run: uv run python -m pytest tests/integration
      - run: uv run python -m compileall packages/pipeline_contracts python_packages/campaign_factory python_packages/reel_factory python_packages/reference_factory

  hygiene:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - run: git diff --check
      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz -o /tmp/gitleaks.tgz
          tar -xzf /tmp/gitleaks.tgz -C /tmp gitleaks
      - name: Run gitleaks
        run: /tmp/gitleaks detect --no-git --redact --config .gitleaks.toml --source .
      - run: bash scripts/check-runtime-artifacts.sh

  sbom:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: pnpm/action-setup@v6
        with:
          version: 11.6.0
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - uses: astral-sh/setup-uv@v7
      - run: pnpm install --frozen-lockfile
      - name: Generate SBOMs
        run: |
          mkdir -p artifacts/sbom
          pnpm dlx @cyclonedx/cdxgen -t js --no-install-deps --no-babel --output artifacts/sbom/js.cdx.json .
          uv export --format requirements.txt --all-packages --all-groups --frozen --output-file artifacts/sbom/python-requirements.txt
      - uses: actions/upload-artifact@v7
        with:
          name: creator-os-sbom
          path: artifacts/sbom
      - name: Attest SBOM provenance
        uses: actions/attest-build-provenance@v4.1.1
        with:
          subject-path: artifacts/sbom/*
