name: Creator OS Monorepo CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  contracts:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 11.6.0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check:contracts

  architecture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: pnpm/action-setup@v6
        with:
          version: 11.6.0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - uses: astral-sh/setup-uv@v7
      - run: pnpm install --frozen-lockfile
      - run: uv sync --dev
      - run: pnpm lint:py
      - run: pnpm typecheck:py
      - run: pnpm check:arch
      - run: pnpm check:arch:fixtures

  javascript:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 11.6.0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - name: Install media tooling
        run: brew install ffmpeg tesseract
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter contentforge lint
      - run: pnpm --filter contentforge test

  python:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - name: Install media tooling
        run: brew install ffmpeg tesseract
      - run: uv sync --all-extras --all-packages
      - run: uv run pytest packages/pipeline_contracts/tests
      - run: uv run pytest python_packages/campaign_factory/tests
      - run: uv run pytest python_packages/reel_factory/tests
      - run: uv run pytest python_packages/reference_factory/tests
      - run: uv run pytest tests/integration
      - run: uv run python -m compileall packages/pipeline_contracts python_packages/campaign_factory python_packages/reel_factory python_packages/reference_factory

  hygiene:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - run: git diff --check
      - name: Install gitleaks
        run: brew install gitleaks
      - name: Run gitleaks
        run: gitleaks detect --no-git --redact --config .gitleaks.toml --source .
      - run: bash scripts/check-runtime-artifacts.sh

  sbom:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: pnpm/action-setup@v6
        with:
          version: 11.6.0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - uses: astral-sh/setup-uv@v7
      - run: pnpm install --frozen-lockfile
      - name: Generate SBOMs
        run: |
          mkdir -p artifacts/sbom
          pnpm dlx @cyclonedx/cdxgen -t js --no-install-deps --no-babel --output artifacts/sbom/js.cdx.json .
          uv export --format requirements.txt --all-packages --all-groups --frozen --output-file artifacts/sbom/python-requirements.txt
      - uses: actions/upload-artifact@v7
        with:
          name: creator-os-sbom
          path: artifacts/sbom
      - name: Attest SBOM provenance
        uses: actions/attest-build-provenance@v4.1.1
        with:
          subject-path: artifacts/sbom/*
