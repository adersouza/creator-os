name: Creator OS Monorepo CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  contracts:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.6.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check:contracts

  architecture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: pnpm/action-setup@v4
        with:
          version: 11.6.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: astral-sh/setup-uv@v7
      - run: pnpm install --frozen-lockfile
      - run: uv sync --dev
      - run: pnpm check:arch

  javascript:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.6.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install media tooling
        run: brew install ffmpeg tesseract
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter contentforge test
      - run: pnpm --filter juno33 test
      - run: pnpm --filter juno33 typecheck
        env:
          NODE_OPTIONS: --max-old-space-size=4096

  visual-regression:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.6.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --dir apps/dashboard exec playwright install chromium
      - run: pnpm test:visual

  python:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
      - name: Install media tooling
        run: brew install ffmpeg tesseract
      - run: uv sync --all-extras --all-packages
      - run: uv run pytest packages/pipeline_contracts/tests
      - run: uv run pytest python_packages/campaign_factory/tests
      - run: uv run pytest python_packages/reel_factory/tests
      - run: uv run pytest python_packages/reference_factory/tests
      - run: uv run pytest tests/integration
      - run: uv run python -m compileall packages/pipeline_contracts python_packages/campaign_factory python_packages/reel_factory python_packages/reference_factory

  hygiene:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: git diff --check
      - run: bash scripts/check-runtime-artifacts.sh

  sbom:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: pnpm/action-setup@v4
        with:
          version: 11.6.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: astral-sh/setup-uv@v7
      - run: pnpm install --frozen-lockfile
      - name: Generate SBOMs
        run: |
          mkdir -p artifacts/sbom
          pnpm dlx @cyclonedx/cdxgen -t js --no-install-deps --no-babel --output artifacts/sbom/js.cdx.json .
          uv export --format requirements.txt --all-packages --all-groups --frozen --output-file artifacts/sbom/python-requirements.txt
      - uses: actions/upload-artifact@v4
        with:
          name: creator-os-sbom
          path: artifacts/sbom
