name: Creator OS Monorepo CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      js: ${{ steps.filter.outputs.js }}
      py: ${{ steps.filter.outputs.py }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            js:
              - 'apps/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - '.github/workflows/monorepo-ci.yml'
            py:
              - 'python_packages/**'
              - 'packages/pipeline_contracts/**'
              - 'tests/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - '.github/workflows/monorepo-ci.yml'

  contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 11.6.0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check:contracts

  architecture:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: pnpm/action-setup@v6
        with:
          version: 11.6.0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - uses: astral-sh/setup-uv@v7
      - run: pnpm install --frozen-lockfile
      - run: uv sync --dev
      - run: pnpm lint:py
      - run: pnpm typecheck:py
      - run: pnpm check:arch
      - run: pnpm check:arch:fixtures

  javascript:
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.js == 'true'
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 11.6.0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - name: Install media tooling
        run: brew install ffmpeg tesseract
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter contentforge lint
      - run: pnpm --filter contentforge test
      - run: pnpm --filter contentforge build
      - run: pnpm --filter command-center lint
      - run: pnpm --filter command-center test
      - run: pnpm --filter command-center build

  python:
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.py == 'true'
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
      - name: Install media tooling
        run: brew install ffmpeg tesseract
      - run: uv sync --all-extras --all-packages
      - run: uv run pytest packages/pipeline_contracts/tests
      - run: uv run pytest python_packages/campaign_factory/tests
      - run: uv run pytest python_packages/reel_factory/tests
      - run: uv run pytest python_packages/reference_factory/tests
      - run: uv run pytest tests/integration
      - run: uv run python -m compileall packages/pipeline_contracts python_packages/campaign_factory python_packages/reel_factory python_packages/reference_factory

  hygiene:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - run: git diff --check
      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz -o /tmp/gitleaks.tgz
          tar -xzf /tmp/gitleaks.tgz -C /tmp gitleaks
      - name: Run gitleaks
        run: /tmp/gitleaks detect --no-git --redact --config .gitleaks.toml --source .
      - run: bash scripts/check-runtime-artifacts.sh

  sbom:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: pnpm/action-setup@v6
        with:
          version: 11.6.0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - uses: astral-sh/setup-uv@v7
      - run: pnpm install --frozen-lockfile
      - name: Generate SBOMs
        run: |
          mkdir -p artifacts/sbom
          pnpm dlx @cyclonedx/cdxgen -t js --no-install-deps --no-babel --output artifacts/sbom/js.cdx.json .
          uv export --format requirements.txt --all-packages --all-groups --frozen --output-file artifacts/sbom/python-requirements.txt
      - uses: actions/upload-artifact@v7
        with:
          name: creator-os-sbom
          path: artifacts/sbom
      - name: Attest SBOM provenance
        uses: actions/attest-build-provenance@v4.1.1
        with:
          subject-path: artifacts/sbom/*
