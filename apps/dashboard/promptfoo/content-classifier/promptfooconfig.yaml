prompts:
  - 'Classify this {{platform}} post into exactly ONE of these categories: promotional, educational, entertainment, behind-the-scenes, engagement-bait, inspirational, news, user-generated.

    Post caption: "{{caption}}"
    Media type: {{mediaType}}
    Hashtags: {{hashtags}}
    Platform: {{platform}}

    Respond with ONLY a JSON object: {"primary": "<category>", "confidence": <0.0-1.0>}
    No other text.'

providers:
  - id: google:gemini-2.0-flash
    config:
      temperature: 0.2
      maxOutputTokens: 100

tests:
  - vars:
      platform: threads
      caption: "Check out our new summer collection! 20% off with code SUMMER20. https://shop.juno33.com"
      mediaType: image
      hashtags: "#summer #fashion"
    assert:
      - type: javascript
        value: JSON.parse(output).primary === 'promotional'
      - type: javascript
        value: JSON.parse(output).confidence >= 0.8

  - vars:
      platform: instagram
      caption: "Ever wondered how we build our dashboard? Here is a sneak peek at the team working late last night in the studio."
      mediaType: video
      hashtags: "#behindthescenes #startup"
    assert:
      - type: javascript
        value: JSON.parse(output).primary === 'behind-the-scenes'

  - vars:
      platform: threads
      caption: "What is your #1 tip for growing on Threads? Tell us in the replies! 👇"
      mediaType: text
      hashtags: "#growth #threads"
    assert:
      - type: javascript
        value: JSON.parse(output).primary === 'engagement-bait'

  - vars:
      platform: instagram
      caption: "The 5 steps to mastering social media analytics: 1. Set goals 2. Track metrics 3. Analyze data 4. Adjust strategy 5. Repeat."
      mediaType: carousel
      hashtags: "#education #marketing"
    assert:
      - type: javascript
        value: JSON.parse(output).primary === 'educational'
