name: Supabase Branch Replay

on:
  pull_request:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/config.toml'
      - 'scripts/lint-supabase-migrations.mjs'
      - '.github/workflows/supabase-branch-replay.yml'

permissions:
  contents: read

jobs:
  replay:
    name: Clean migration replay on preview branch
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    env:
      SUPABASE_PROJECT_REF: apsrvwxfoomhtswlhczo
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      BRANCH_NAME: pr-${{ github.event.pull_request.number }}-replay-${{ github.run_id }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Lint changed migrations
        run: node scripts/lint-supabase-migrations.mjs --base=origin/main

      - name: Validate Supabase token
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "SUPABASE_ACCESS_TOKEN is required for branch replay."
            exit 1
          fi

      - name: Create replay branch
        id: create
        run: |
          set -euo pipefail
          response="$(curl -fsS \
            -X POST "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_REF}/branches" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "{\"branch_name\":\"${BRANCH_NAME}\",\"with_data\":false,\"persistent\":false}")"
          echo "$response" | jq .
          workflow_run_id="$(echo "$response" | jq -r '.workflow_run_id // .action_run_id // empty')"
          echo "workflow_run_id=${workflow_run_id}" >> "$GITHUB_OUTPUT"

      - name: Wait for replay result
        id: wait
        run: |
          set -euo pipefail
          branch_ref=""
          branch_id=""
          for attempt in $(seq 1 40); do
            branch="$(curl -fsS \
              -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
              "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_REF}/branches/${BRANCH_NAME}" || true)"
            if [ -n "$branch" ]; then
              echo "$branch" | jq .
              branch_ref="$(echo "$branch" | jq -r '.project_ref // empty')"
              branch_id="$(echo "$branch" | jq -r '.id // empty')"
              status="$(echo "$branch" | jq -r '.status // empty')"
              preview_status="$(echo "$branch" | jq -r '.preview_project_status // empty')"
              echo "branch_ref=${branch_ref}" >> "$GITHUB_OUTPUT"
              echo "branch_id=${branch_id}" >> "$GITHUB_OUTPUT"
              if [ "$status" = "FUNCTIONS_DEPLOYED" ]; then
                echo "Supabase replay branch migrations finished."
                exit 0
              fi
              if echo "$status $preview_status" | grep -Eq 'FAILED|ERROR|UNHEALTHY'; then
                echo "Supabase replay branch failed: status=${status}, preview_project_status=${preview_status}"
                exit 1
              fi
            fi
            sleep 15
          done
          echo "Timed out waiting for Supabase replay branch ${BRANCH_NAME}."
          exit 1

      - name: Push PR migrations to replay branch
        run: |
          set -euo pipefail
          supabase --experimental branches get "$BRANCH_NAME" --project-ref "$SUPABASE_PROJECT_REF" -o env > branch.env
          postgres_url="$(node - <<'NODE'
          const fs = require('node:fs');
          const values = {};
          for (const rawLine of fs.readFileSync('branch.env', 'utf8').split(/\r?\n/)) {
            const line = rawLine.trim().replace(/^export\s+/, '');
            const equalIndex = line.indexOf('=');
            if (equalIndex === -1) continue;
            const key = line.slice(0, equalIndex);
            let value = line.slice(equalIndex + 1);
            if (
              (value.startsWith('"') && value.endsWith('"')) ||
              (value.startsWith("'") && value.endsWith("'"))
            ) {
              value = value.slice(1, -1);
            }
            values[key] = value;
          }
          process.stdout.write(values.POSTGRES_URL || values.POSTGRES_URL_NON_POOLING || '');
          NODE
          )"
          if [ -z "$postgres_url" ]; then
            echo "Replay branch Postgres URL was not resolved."
            exit 1
          fi
          echo "::add-mask::$postgres_url"
          supabase db push --include-all --db-url "$postgres_url"

      - name: Print action logs on failure
        if: failure()
        run: |
          set +e
          run_id="${{ steps.create.outputs.workflow_run_id }}"
          if [ -z "$run_id" ]; then
            echo "No action run id returned by branch create; printing recent action runs."
            curl -fsS \
              -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
              "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_REF}/actions?limit=5" | jq .
            exit 0
          fi
          echo "Action status:"
          curl -fsS \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_REF}/actions/${run_id}" | jq .
          echo "Action logs:"
          curl -fsS \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_REF}/actions/${run_id}/logs" | jq .

      - name: Delete replay branch
        if: always()
        run: |
          set +e
          target="${{ steps.wait.outputs.branch_ref }}"
          if [ -z "$target" ]; then
            target="${{ steps.wait.outputs.branch_id }}"
          fi
          if [ -z "$target" ]; then
            target="${BRANCH_NAME}"
          fi
          curl -fsS \
            -X DELETE "https://api.supabase.com/v1/branches/${target}?force=true" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" | jq . || true
