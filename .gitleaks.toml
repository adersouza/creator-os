[extend]
useDefault = true

[[rules]]
id = "juno-api-key"
description = "Juno API key"
regex = '''juno_ak_[A-Za-z0-9_-]{8,}'''
keywords = ["juno_ak_"]

[allowlist]
description = "Creator OS local false positives and generated review artifacts"
paths = [
  '''(^|/)\.git/''',
  '''^apps/dashboard/\.claude/''',
  '''^apps/dashboard/mcp-server/README\.md$''',
  '''^apps/dashboard/storybook-static/''',
  '''(^|/)node_modules/''',
  '''(^|/)\.venv/''',
  '''(^|/)\.next/''',
  '''(^|/)\.turbo/''',
  '''(^|/)dist/''',
  '''(^|/)build/''',
  '''(^|/)coverage/''',
  '''(^|/)graphify-out/''',
  '''(^|/)playwright-report/''',
  '''(^|/)test-results/''',
]
regexes = [
  '''creativeApprovalV2''',
  '''juno33-cmdk-recents''',
  '''juno33:ask-history:v1''',
  '''juno33-pending-plan''',
  '''juno33\.pendingPublishJobs''',
  '''juno_ak_abc123def456''',
  '''juno_ak_test_key''',
  '''my-cron-secret-123''',
  '''test-vapid-key-123''',
  '''TD_AUTH_TOKEN="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9\.\.\."''',
]
