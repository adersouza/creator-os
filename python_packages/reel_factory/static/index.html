<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reel Factory</title>
  <script src="/static/vendor/tailwindcdn.js"></script>
  <link rel="stylesheet" href="/static/styles.css?v=20260601_concept_match">
</head>
<body>
  <header class="creator-header">
    <div class="creator-brand">
      <strong>Creator OS</strong>
      <span>Operator Suite</span>
    </div>
    <nav class="creator-tabs" aria-label="Creator OS apps">
      <a id="campaignFactoryTab" href="http://localhost:8877/" data-tooltip="Go to Campaign Factory, the campaign graph, recommendation, trust, and export control room." title="Go to Campaign Factory, the campaign graph, recommendation, trust, and export control room.">Campaign Factory</a>
      <a id="reelFactoryTab" class="active" href="http://localhost:8765/" data-tooltip="Stay in Reel Factory, where source clips become rendered variants and Higgsfield fanout jobs." title="Stay in Reel Factory, where source clips become rendered variants and Higgsfield fanout jobs.">Reel Factory</a>
    </nav>
    <div class="header-tools" aria-label="Operator status">
      <button type="button" title="Help">?</button>
      <button type="button" title="Notifications">3</button>
      <span class="avatar" title="Operator">AD<i></i></span>
    </div>
  </header>

  <div class="creator-shell">
    <aside class="source-rail">
      <div class="rail-title">
        <h2>Source Clips</h2>
        <button class="icon-add" onclick="startVideoFlow()" data-tooltip="Add source videos to the queue. These become captioned, rendered, and reviewed reels." data-tooltip-placement="left" title="Add source videos to the queue. These become captioned, rendered, and reviewed reels.">+</button>
      </div>
      <div class="clip-search-row">
        <input id="clipSearch" type="search" placeholder="Search clips..." title="Search source clips by filename, status, or caption preview.">
        <button type="button" class="filter-button" data-tooltip="Filters are intentionally simple right now: use search to narrow the source queue." data-tooltip-placement="left" title="Filters are intentionally simple right now: use search to narrow the source queue.">⌁</button>
      </div>
      <div class="rail-meta">
        <span>Sort: Newest</span>
        <span id="clipCount">0 clips</span>
      </div>
      <div id="dz" class="dropzone compact-dropzone" data-tooltip="Drop local videos here. Reel Factory saves them as source clips and can auto-create captions." title="Drop local videos here. Reel Factory saves them as source clips and can auto-create captions.">
        <p>Drop video files here</p>
        <span>.mp4 / .mov or click to browse</span>
        <input id="fileInput" type="file" multiple accept="video/mp4,video/quicktime,.mp4,.mov,.m4v" class="hidden">
      </div>
      <div class="reel-import">
        <label for="reelUrl">Import reference reel</label>
        <div class="import-row">
          <input id="reelUrl" placeholder="https://www.instagram.com/reel/..." title="Paste a public reference reel URL to download it locally and use it as generation reference material.">
          <button class="btn btn-secondary" onclick="importReelUrl()" data-tooltip="Import a public reference reel, attach it to the selected campaign, and optionally build a v1 prompt contract preview." title="Import a public reference reel, attach it to the selected campaign, and optionally build a v1 prompt contract preview.">Import</button>
        </div>
        <label class="inline-check">
          <input id="reelAutoPrompt" type="checkbox" checked>
          <span title="When enabled, importing a reference reel also prepares the v1 prompt contract preview.">prompt preview</span>
        </label>
      </div>
      <div id="clips" class="clip-list"></div>
    </aside>

    <main class="main-workspace">
      <section class="workspace-controls">
        <div class="control-group">
          <label>Campaign</label>
          <select id="campaign" title="Choose which Campaign Factory campaign receives references, generated assets, and learning signals.">
            <option value="">no campaign</option>
          </select>
        </div>
        <div class="control-group account-control">
          <label>Account</label>
          <select id="acct" title="Choose the account context used for exports, fatigue checks, and recommendation learning."></select>
        </div>
        <span id="lastUpdated" class="last-updated">Last updated: just now</span>
        <button class="btn btn-secondary" onclick="loadDashboardSummary()" data-tooltip="Reload clip counts, review status, recommendation summary, and proof rail metrics." title="Reload clip counts, review status, recommendation summary, and proof rail metrics.">Refresh</button>
        <button class="btn btn-secondary" onclick="toggleAdvancedControls()" data-tooltip="Show secondary pipeline controls such as worker count, encoder profile, and manual batch tools." data-tooltip-placement="left" title="Show secondary pipeline controls such as worker count, encoder profile, and manual batch tools.">Advanced</button>
      </section>

      <section id="statusStrip" class="health-strip"></section>

      <section id="advancedControls" class="advanced-controls hidden">
        <button class="btn btn-secondary" onclick="createCampaignFromUi()" data-tooltip="Create a campaign record without leaving Reel Factory. Campaign Factory remains the source of truth." title="Create a campaign record without leaving Reel Factory. Campaign Factory remains the source of truth.">+ Campaign</button>
        <button class="btn btn-secondary" onclick="showNextBatch()" data-tooltip="Ask Campaign Factory for the next recommended ideas for the selected campaign." title="Ask Campaign Factory for the next recommended ideas for the selected campaign.">Next batch</button>
        <button class="btn btn-secondary" onclick="showCampaignLeaderboard()" data-tooltip="Show the campaign's strongest recipes and repeated failure patterns from outcome data." title="Show the campaign's strongest recipes and repeated failure patterns from outcome data.">Leaderboard</button>
        <button id="run" class="btn" data-tooltip="Render caption and recipe variants for the selected source clip. This does not publish anything." title="Render caption and recipe variants for the selected source clip. This does not publish anything.">Run pipeline</button>
        <select id="textVariation" title="Caption text variation controls whether captions stay exact or get slang/spun variants.">
          <option value="off">exact captions</option>
          <option value="auto">slang variants</option>
        </select>
        <select id="workers" title="How many local ffmpeg render workers can run at the same time. Higher is faster but heavier.">
          <option value="1">1 worker</option><option value="2">2 workers</option><option value="3" selected>3 workers</option><option value="4">4 workers</option><option value="5">5 workers</option><option value="6">6 workers</option>
        </select>
        <label class="inline-check" title="Also export ProRes review files for editing workflows."><input id="mezzanine" type="checkbox"> ProRes</label>
        <label class="inline-check" title="Run visual quality checks after rendering and flag suspicious outputs."><input id="aiQc" type="checkbox"> AI QC</label>
        <label class="inline-check" title="Run readiness checks for platform-safe export. Warnings do not auto-publish."><input id="readiness" type="checkbox"> Readiness</label>
        <select id="captionRenderer" title="Choose the caption rendering engine. Pillow is the stable default."><option value="pillow" selected>Pillow captions</option><option value="pango">Pango spike</option></select>
        <select id="placementMode" title="Choose whether captions follow source defaults or segment-specific placement."><option value="source" selected>Source placement</option><option value="segment">Segment placement</option></select>
        <select id="outputProfile" title="Choose the video encoder profile for local rendering. Mac H.264 is fastest on this machine."><option value="mac_h264_videotoolbox" selected>Mac H.264</option><option value="cpu_h264_x264">CPU x264</option><option value="linux_nvenc">NVENC profile</option></select>
        <select id="targetRatios" title="Choose target export ratios. 9:16 is the normal Reels/TikTok format."><option value="9:16" selected>9:16</option><option value="4:5">4:5</option><option value="9:16,4:5">9:16 + 4:5</option></select>
      </section>

      <section id="run-bar" class="run-panel hidden">
        <div class="run-head">
          <div><span class="spin"></span><span id="run-state">running...</span></div>
          <span id="run-elapsed"></span>
        </div>
        <div class="log" id="run-log"></div>
      </section>

      <section id="detail" class="detail-panel">
        <p class="empty-state">Drop a video or select a source clip to start.</p>
      </section>
    </main>

    <aside id="proofRail" class="proof-rail"></aside>
  </div>

  <script src="/static/app.js?v=20260601_concept_match"></script>
</body>
</html>
