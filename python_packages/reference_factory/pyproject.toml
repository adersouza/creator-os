[project]
name = "reference-factory"
version = "0.1.0"
description = "Local reference reel corpus analyzer for high-performing short-form videos."
requires-python = ">=3.11"
dependencies = [
  "fastapi>=0.115",
  "pipeline-contracts",
  "pydantic>=2,<3",
  "uvicorn>=0.30",
]

[project.optional-dependencies]
gemini = ["google-genai>=1,<3"]
test = ["pytest>=8"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]

[tool.uv.sources]
pipeline-contracts = { workspace = true }

[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["reference_factory*"]
exclude = ["tests*"]
