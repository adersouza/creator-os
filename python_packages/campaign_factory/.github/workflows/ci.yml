name: CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/checkout@v6
        with:
          repository: adersouza/pipeline_contracts
          path: _pipeline_contracts
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pipeline_contracts
        run: pip install -e _pipeline_contracts

      - name: Install campaign_factory
        run: pip install -e '.[dev]'

      - name: Run tests
        run: python -m pytest -q tests/
