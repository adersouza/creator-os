[project]
name = "creator-os-core"
version = "0.1.0"
description = "Shared foundational helpers (auth, atomic file ops, SQLite, vector math, media probe) for the Creator OS factory packages"
requires-python = ">=3.11"
dependencies = ["fastapi>=0.115"]

[project.optional-dependencies]
dev = ["pytest>=8,<9"]

[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = ["creator_os_core"]

[tool.pytest.ini_options]
testpaths = ["tests"]
