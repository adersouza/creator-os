[project]
name = "pipeline-contracts"
version = "0.1.0"
description = "Shared JSON schemas and validators for the local content pipeline"
requires-python = ">=3.11"
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=8,<9"]

[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = ["pipeline_contracts"]

[tool.setuptools.package-data]
pipeline_contracts = ["schemas/*.json"]

[tool.pytest.ini_options]
testpaths = ["tests"]
