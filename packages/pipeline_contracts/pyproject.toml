[project]
name = "pipeline-contracts"
version = "0.1.0"
description = "Shared JSON schemas and validators for the local content pipeline"
requires-python = ">=3.11"
dependencies = ["jsonschema>=4.23,<5"]

[project.optional-dependencies]
dev = ["pytest>=9.0.3,<10"]

[build-system]
requires = ["setuptools>=83"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = ["pipeline_contracts"]

[tool.setuptools.package-data]
pipeline_contracts = ["schemas/*.json"]

[tool.pytest.ini_options]
testpaths = ["tests"]
